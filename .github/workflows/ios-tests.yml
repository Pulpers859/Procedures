name: iOS Unit Tests

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, Run XCTest, and Verify Release Build
    runs-on: macos-latest
    timeout-minutes: 35
    env:
      RESULT_BUNDLE: ProceduresTests.xcresult
      XCODE_LOG: xcodebuild-test.log
      RELEASE_LOG: xcodebuild-release.log
      DERIVED_DATA: ProceduresDerivedData

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify project source membership
        run: python3 scripts/verify_xcode_project.py

      - name: Report Xcode toolchain
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun simctl list runtimes
          xcrun simctl list devices available -j > simulator-inventory.json

      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          udid="$(python3 - <<'PY'
          import json
          import re
          import subprocess

          payload = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          ))
          candidates = []
          for runtime, devices in payload.get("devices", {}).items():
              version = tuple(int(part) for part in re.findall(r"\d+", runtime))
              for device in devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))
          if not candidates:
              raise SystemExit("No available iPhone simulator was found on the runner")
          candidates.sort(reverse=True)
          print(candidates[0][2])
          PY
          )"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$udid" 2>/dev/null || true
          xcrun simctl bootstatus "$udid" -b

      - name: Run XCTest with result bundle
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Procedures.xcodeproj \
            -scheme Procedures \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -destination-timeout 120 \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -skipMacroValidation \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$XCODE_LOG"

      - name: Require executed tests
        shell: bash
        run: |
          set -euo pipefail
          xcrun xcresulttool get test-results summary \
            --path "$RESULT_BUNDLE" \
            --format json > test-summary.json
          expected="$(python3 scripts/verify_xcode_project.py --test-count-only)"
          python3 scripts/verify_xcresult_summary.py \
            test-summary.json \
            --expected "$expected"

      - name: Verify Release configuration builds
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Procedures.xcodeproj \
            -scheme Procedures \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            -skipMacroValidation \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$RELEASE_LOG"

      - name: Upload Xcode evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: procedures-xcode-evidence-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            ProceduresTests.xcresult
            test-summary.json
            simulator-inventory.json
            xcodebuild-test.log
            xcodebuild-release.log
