name: Validate content

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Clinical content validation
    # Pinned so the validation environment cannot drift with zero repo changes.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install pinned validation dependencies
        run: python3 -m pip install --disable-pip-version-check -r scripts/requirements-validation.txt

      - name: Run validator negative-control tests
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py"

      # Fails the build on any content blocker (missing sections, duplicate IDs,
      # invalid relationships, etc). Release-only clinical approval gates run in
      # the separate release-readiness workflow.
      - name: Run content validator
        run: python3 scripts/validate_procedures.py
