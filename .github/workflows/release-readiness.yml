name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ios-evidence:
    name: Reuse iOS Build and XCTest Gate
    uses: ./.github/workflows/ios-tests.yml

  clinical-release-gate:
    name: Strict Clinical Release Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install pinned validation dependencies
        run: python3 -m pip install --disable-pip-version-check -r scripts/requirements-validation.txt

      - name: Run validator negative-control tests
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Verify Xcode project source membership
        run: python3 scripts/verify_xcode_project.py

      - name: Enforce strict clinical release policy
        run: python3 scripts/validate_procedures.py --release
